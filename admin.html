<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TabungKu - Panel Pentadbir</title>
  <link rel="icon" href="logo.jpg" type="image/jpg">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* CSS SAMA SEPERTI SEBELUMNYA (responsif, tidak diubah) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Sora', sans-serif; background: #0e1a14; color: #f0ebe1; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0; }
    .orb1 { width: 500px; height: 500px; background: #3ecf6e; top: -100px; right: -100px; }
    .orb2 { width: 400px; height: 400px; background: #f5b731; bottom: -50px; left: -100px; }
    .container { max-width: 1400px; margin: 0 auto; padding: 12px; position: relative; z-index: 1; width: 100%; }
    .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; }
    .login-container { max-width: 400px; width: 90%; background: rgba(20,35,22,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(62,207,110,0.2); border-radius: 28px; padding: 24px 20px; text-align: center; }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; }
    .login-logo img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .login-logo span { font-size: 22px; font-weight: 800; color: #3ecf6e; }
    .login-field { margin-bottom: 18px; text-align: left; }
    .login-field label { font-size: 12px; font-weight: 600; color: #5a7a60; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .login-input { width: 100%; background: #0a1410; border: 1.5px solid #2a3d2e; border-radius: 12px; padding: 12px 14px; font-family: 'Sora', sans-serif; font-size: 14px; color: #f0ebe1; outline: none; }
    .login-input:focus { border-color: #3ecf6e; }
    .login-btn { width: 100%; background: #3ecf6e; color: #0a1410; border: none; border-radius: 12px; padding: 12px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .login-btn:hover { background: #52e07e; }
    .error-msg { background: rgba(220,60,60,0.15); border: 1px solid rgba(220,60,60,0.4); border-radius: 10px; padding: 10px; font-size: 13px; color: #e05555; margin-top: 12px; display: none; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; background: rgba(20,35,22,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(62,207,110,0.2); border-radius: 20px; padding: 10px 14px; margin-bottom: 16px; }
    .admin-title { font-size: 16px; font-weight: 800; color: #3ecf6e; }
    .admin-logout { background: rgba(220,60,60,0.12); border: 1px solid rgba(220,60,60,0.3); color: #e05555; padding: 6px 14px; border-radius: 40px; font-weight: 600; font-size: 13px; cursor: pointer; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: rgba(20,35,22,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(62,207,110,0.15); border-radius: 18px; padding: 12px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .stat-number { font-size: 24px; font-weight: 800; color: #3ecf6e; }
    .stat-label { font-size: 10px; color: #8a9e90; margin-top: 4px; }
    .btn-export { background: rgba(62,207,110,0.1); border: 1px solid rgba(62,207,110,0.3); color: #3ecf6e; padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
    .btn-export:hover { background: rgba(62,207,110,0.2); }
    .admin-layout { display: flex; flex-direction: column; gap: 16px; }
    .user-sidebar { width: 100%; background: rgba(20,35,22,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(62,207,110,0.15); border-radius: 20px; padding: 14px; }
    .user-sidebar h3 { font-size: 13px; font-weight: 700; color: #3ecf6e; margin-bottom: 12px; }
    .user-search input { width: 100%; background: #0a1410; border: 1px solid #2a3d2e; border-radius: 40px; padding: 10px 14px; color: #f0ebe1; font-size: 13px; margin-bottom: 14px; }
    .user-list { max-height: 40vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .user-item { background: #0a1410; border-radius: 14px; padding: 10px 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
    .user-item:hover { border-color: rgba(62,207,110,0.4); background: #0e1e16; }
    .user-item.active { border-color: #3ecf6e; background: rgba(62,207,110,0.08); }
    .user-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .team-badge { background: #3ecf6e20; color: #3ecf6e; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 30px; display: inline-flex; align-items: center; gap: 4px; }
    .user-email { font-size: 11px; color: #5a7a60; word-break: break-all; margin-top: 2px; }
    .user-detail { width: 100%; background: rgba(20,35,22,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(62,207,110,0.15); border-radius: 20px; padding: 14px; overflow-x: hidden; }
    .detail-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #1e3322; }
    .detail-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; word-break: break-word; }
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; white-space: nowrap; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
    .tab-btn { background: none; border: none; padding: 6px 14px; font-family: 'Sora', sans-serif; font-weight: 600; font-size: 13px; color: #5a7a60; cursor: pointer; border-radius: 30px; transition: 0.2s; flex-shrink: 0; }
    .tab-btn.active { background: #3ecf6e20; color: #3ecf6e; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section-card { background: #0a1410; border-radius: 16px; padding: 14px; margin-bottom: 16px; border: 1px solid #1e3322; overflow-x: hidden; }
    .section-title { font-size: 12px; font-weight: 700; color: #3ecf6e; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    .info-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid #1e3322; font-size: 13px; gap: 8px; }
    .info-label { color: #8a9e90; flex-shrink: 0; }
    .info-value { font-weight: 600; color: #f0ebe1; text-align: right; word-break: break-word; flex: 1; }
    .btn-edit { background: rgba(62,207,110,0.1); border: 1px solid rgba(62,207,110,0.3); color: #3ecf6e; padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
    .btn-edit:hover { background: rgba(62,207,110,0.2); }
    .btn-danger { background: rgba(220,60,60,0.1); border-color: rgba(220,60,60,0.4); color: #e05555; }
    .btn-danger:hover { background: rgba(220,60,60,0.2); }
    .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .goal-card { background: #0e1a14; border-radius: 14px; padding: 12px; margin-bottom: 12px; }
    .progress-bar-mini { height: 6px; background: #1a2e1e; border-radius: 4px; margin: 8px 0; overflow: hidden; }
    .progress-fill-mini { background: #3ecf6e; height: 100%; width: 0%; }
    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 11px; font-weight: 600; color: #5a7a60; display: block; margin-bottom: 4px; }
    .admin-input, .admin-select { width: 100%; background: #0e1a14; border: 1.5px solid #2a3d2e; border-radius: 10px; padding: 10px 12px; color: #f0ebe1; font-family: 'Sora', sans-serif; font-size: 13px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0e1a14; border: 1px solid #3ecf6e; border-radius: 100px; padding: 8px 18px; color: #3ecf6e; font-weight: 600; z-index: 999; font-size: 12px; max-width: 90vw; white-space: normal; text-align: center; }
    .toast.error { border-color: #e05555; color: #e05555; }
    @media (min-width: 768px) {
      .container { padding: 20px; }
      .admin-layout { flex-direction: row; align-items: flex-start; }
      .user-sidebar { width: 280px; flex-shrink: 0; }
      .user-detail { flex: 1; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
      .user-list { max-height: 60vh; }
    }
  </style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="container" id="appContainer">
  <div id="loginPanel" class="login-wrapper">
    <div class="login-container">
      <div class="login-logo">
        <img src="logo.jpg" alt="TabungKu" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2244%22 height=%2244%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%233ecf6e%22 /%3E%3Ctext x=%2250%22 y=%2270%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22%230a1410%22 font-family=%22Arial%22%3E💰%3C/text%3E%3C/svg%3E';">
        <span>Pentadbir</span>
      </div>
      <div class="login-field"><label>E-mel Pentadbir</label><input type="email" id="adminEmail" class="login-input" placeholder="admin@tabungku.com"></div>
      <div class="login-field"><label>Kata Laluan</label><input type="password" id="adminPassword" class="login-input" placeholder="••••••••"></div>
      <button class="login-btn" id="adminLoginBtn">Log Masuk Sebagai Pentadbir</button>
      <div id="loginError" class="error-msg"></div>
    </div>
  </div>

  <div id="adminDashboard" style="display:none;">
    <div class="admin-header">
      <div class="admin-title">Panel Pentadbir 💰 TabungKu</div>
      <button class="admin-logout" id="logoutBtn">🚪 Log Keluar</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="admin-layout">
      <div class="user-sidebar">
        <h3>📋 SENARAI PENGGUNA</h3>
        <div class="user-search"><input type="text" id="searchUser" placeholder="Cari nama atau e-mel..."></div>
        <div class="user-list" id="userListContainer"><div class="no-users">Memuatkan...</div></div>
      </div>
      <div class="user-detail" id="userDetailPanel">
        <div class="detail-header">
          <div class="detail-title" id="selectedUserName">Pilih pengguna</div>
          <button class="btn-edit" id="toggleTeamBtn" style="display:none;">⭐ Toggle Ahli Pasukan</button>
        </div>
        <div class="tabs" id="userTabs">
          <button class="tab-btn active" data-tab="profile">👤 Profil</button>
          <button class="tab-btn" data-tab="plan">📊 Pelan</button>
          <button class="tab-btn" data-tab="goals">🎯 Matlamat</button>
          <button class="tab-btn" data-tab="danger">⚠️ Bahaya</button>
        </div>
        <div id="tabProfile" class="tab-content active"></div>
        <div id="tabPlan" class="tab-content"></div>
        <div id="tabGoals" class="tab-content"></div>
        <div id="tabDanger" class="tab-content"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCwnb1D-qqyjUDNimf1tV6jREshvkGujgY",
    authDomain: "achievaaa-a8b1d.firebaseapp.com",
    projectId: "achievaaa-a8b1d",
    storageBucket: "achievaaa-a8b1d.firebasestorage.app",
    messagingSenderId: "1019216709115",
    appId: "1:1019216709115:web:4782960e4363bd7f56f75e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ALLOWED_ADMIN_EMAIL = "admin@tabungku.com";

  let currentAdmin = null;
  let allUsers = [];
  let selectedUserId = null;

  const FORMULAS = { '70/20/10':{needs:70,wants:20,savings:10}, '50/30/20':{needs:50,wants:30,savings:20} };

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function showToast(msg, isError = false) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  // ================ Fungsi untuk papar dashboard & muat data ================
  async function showAdminDashboard() {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminDashboard').style.display = 'block';
    await loadAllUsers();
  }

  function hideAdminDashboard() {
    document.getElementById('loginPanel').style.display = 'flex';
    document.getElementById('adminDashboard').style.display = 'none';
    // reset form login
    document.getElementById('adminEmail').value = '';
    document.getElementById('adminPassword').value = '';
    document.getElementById('loginError').style.display = 'none';
  }

  // ================ Login manual (button) ================
  document.getElementById('adminLoginBtn').addEventListener('click', async () => {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorDiv = document.getElementById('loginError');
    errorDiv.style.display = 'none';
    if (!email || !password) {
      errorDiv.textContent = 'Sila isi e-mel dan kata laluan.';
      errorDiv.style.display = 'block';
      return;
    }
    const loginBtn = document.getElementById('adminLoginBtn');
    loginBtn.disabled = true;
    loginBtn.textContent = 'Log masuk...';
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      if (userCredential.user.email !== ALLOWED_ADMIN_EMAIL) {
        await signOut(auth);
        throw new Error('Akses ditolak. Hanya pentadbir yang dibenarkan.');
      }
      // onAuthStateChanged akan trigger dan panggil showAdminDashboard
    } catch (err) {
      errorDiv.textContent = err.message || 'Log masuk gagal. Periksa e-mel/kata laluan.';
      errorDiv.style.display = 'block';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Log Masuk Sebagai Admin';
    }
  });

  // Logout button
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    showToast('Log keluar');
  });

  // ================ Firebase Auth State Observer ================
  onAuthStateChanged(auth, async (user) => {
    if (user && user.email === ALLOWED_ADMIN_EMAIL) {
      currentAdmin = user;
      await showAdminDashboard();
    } else {
      // Jika user tidak sah atau bukan admin, pastikan logout dan tunjuk login panel
      if (user && user.email !== ALLOWED_ADMIN_EMAIL) {
        await signOut(auth);
      }
      currentAdmin = null;
      hideAdminDashboard();
    }
  });

  // ================ Fungsi muat data (sama seperti sebelumnya) ================
  async function loadAllUsers() {
    try {
      const q = query(collection(db, 'users'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderUserList();
      updateStats();
    } catch(e) { console.error(e); showToast("Gagal memuat pengguna", true); }
  }

  function updateStats() {
    const total = allUsers.length;
    const withPlan = allUsers.filter(u => u.plan && u.plan.income > 0).length;
    const team = allUsers.filter(u => u.isTeamMember === true).length;
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Jumlah Pengguna</div></div>
      <div class="stat-card"><div class="stat-number">${withPlan}</div><div class="stat-label">Pengguna Aktif (ada pelan)</div></div>
      <div class="stat-card"><div class="stat-number">${team}</div><div class="stat-label">⭐ Ahli Pasukan</div></div>
      <div class="stat-card"><button class="btn-export" id="exportCSVBtn">📥 Eksport CSV</button></div>
    `;
    document.getElementById('exportCSVBtn')?.addEventListener('click', () => exportToCSV());
  }

  async function exportToCSV() {
    let csvRows = [["ID","Username","Email","Team Member","Pendapatan","Formula","Simpanan/Bulan","Jumlah Matlamat","Matlamat Selesai"]];
    for (const u of allUsers) {
      const plan = u.plan || {};
      const income = plan.income || 0;
      let savingsAmt = 0;
      if (plan.formula === 'free' && plan.freePct) savingsAmt = Math.round(income * plan.freePct.savings / 100);
      else if (FORMULAS[plan.formula]) savingsAmt = Math.round(income * FORMULAS[plan.formula].savings / 100);
      csvRows.push([u.id, u.username || '', u.email || '', u.isTeamMember ? "Ya" : "Tidak", income, plan.formula || "-", savingsAmt, "-", "-"]);
    }
    const csvContent = csvRows.map(row => row.join(",")).join("\n");
    const blob = new Blob([csvContent], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tabungku_users.csv";
    a.click();
    URL.revokeObjectURL(url);
    showToast("Eksport CSV selesai");
  }

  function renderUserList() {
    const searchTerm = document.getElementById('searchUser').value.toLowerCase();
    const filtered = allUsers.filter(u => (u.username || '').toLowerCase().includes(searchTerm) || (u.email || '').toLowerCase().includes(searchTerm));
    const container = document.getElementById('userListContainer');
    if (filtered.length === 0) { container.innerHTML = '<div class="no-users">Tiada pengguna</div>'; return; }
    container.innerHTML = filtered.map(user => `
      <div class="user-item ${selectedUserId === user.id ? 'active' : ''}" data-id="${user.id}">
        <div class="user-name">
          ${escapeHtml(user.username || 'Tanpa nama')}
          ${user.isTeamMember ? '<span class="team-badge">⭐ Ahli Pasukan</span>' : ''}
        </div>
        <div class="user-email">${escapeHtml(user.email)}</div>
      </div>
    `).join('');
    document.querySelectorAll('.user-item').forEach(el => {
      el.addEventListener('click', () => selectUser(el.dataset.id));
    });
  }

  document.getElementById('searchUser').addEventListener('input', () => renderUserList());

  async function selectUser(uid) {
    selectedUserId = uid;
    renderUserList();
    const user = allUsers.find(u => u.id === uid);
    document.getElementById('selectedUserName').innerHTML = `${escapeHtml(user.username)} ${user.isTeamMember ? '<span class="team-badge">⭐ Ahli Pasukan</span>' : ''}`;
    const toggleBtn = document.getElementById('toggleTeamBtn');
    toggleBtn.style.display = 'inline-flex';
    toggleBtn.innerHTML = user.isTeamMember ? '⭐ Buang Ahli Pasukan' : '⭐ Jadikan Ahli Pasukan';
    toggleBtn.onclick = () => toggleTeamMember(uid);
    await loadUserFullDetail(uid);
  }

  async function toggleTeamMember(uid) {
    const user = allUsers.find(u => u.id === uid);
    const newStatus = !user.isTeamMember;
    await updateDoc(doc(db, 'users', uid), { isTeamMember: newStatus });
    user.isTeamMember = newStatus;
    renderUserList();
    selectUser(uid);
    updateStats();
    showToast(newStatus ? 'Pengguna kini Ahli Pasukan ⭐' : 'Status ahli pasukan dibuang');
  }

  async function loadUserFullDetail(uid) {
    try {
      const userDoc = await getDoc(doc(db, 'users', uid));
      const userProfile = userDoc.exists() ? userDoc.data() : {};
      const goalsSnap = await getDocs(collection(db, 'users', uid, 'goals'));
      const goals = goalsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById('tabProfile').innerHTML = renderProfileTab(uid, userProfile);
      document.getElementById('tabPlan').innerHTML = renderPlanTab(uid, userProfile.plan);
      document.getElementById('tabGoals').innerHTML = renderGoalsTab(uid, goals);
      document.getElementById('tabDanger').innerHTML = renderDangerTab(uid);
      attachPlanTabEvents(uid);
      attachGoalsTabEvents(uid);
      attachProfileEvents(uid, userProfile);
      attachDangerEvent(uid);
    } catch(e) { console.error(e); showToast("Ralat memuat butiran pengguna", true); }
  }

  function attachProfileEvents(uid, profile) {
    const editBtn = document.getElementById('editProfileBtn');
    const resetBtn = document.getElementById('resetPwBtn');
    if (editBtn) editBtn.onclick = async () => {
      const newUsername = prompt('Nama pengguna baharu:', profile.username || '');
      if (newUsername && newUsername.trim()) {
        await updateDoc(doc(db, 'users', uid), { username: newUsername.trim() });
        showToast('Nama pengguna dikemas kini');
        loadAllUsers();
        selectUser(uid);
      }
      const newAvatar = prompt('URL Avatar baharu (kosong untuk kosongkan):', profile.avatarUrl || '');
      if (newAvatar !== null) {
        await updateDoc(doc(db, 'users', uid), { avatarUrl: newAvatar || '' });
        showToast('Avatar dikemas kini');
        loadAllUsers();
        selectUser(uid);
      }
    };
    if (resetBtn) resetBtn.onclick = async () => {
      if (profile.email) {
        try {
          await sendPasswordResetEmail(auth, profile.email);
          showToast(`E-mel reset dihantar ke ${profile.email}`);
        } catch(e) { showToast(e.message, true); }
      }
    };
  }

  function renderProfileTab(uid, profile) {
    return `<div class="section-card"><div class="section-title">👤 MAKLUMAT ASAS</div>
      <div class="info-row"><span class="info-label">Nama Pengguna</span><span class="info-value">${escapeHtml(profile.username || '-')}</span></div>
      <div class="info-row"><span class="info-label">E-mel</span><span class="info-value">${escapeHtml(profile.email || '-')}</span></div>
      <div class="info-row"><span class="info-label">Avatar URL</span><span class="info-value">${profile.avatarUrl || 'Tiada'}</span></div>
      <div class="info-row"><span class="info-label">Tarikh Daftar</span><span class="info-value">${profile.createdAt ? new Date(profile.createdAt).toLocaleDateString('ms-MY') : '-'}</span></div>
      <div class="inline-actions"><button class="btn-edit" id="editProfileBtn">✏️ Sunting Profil</button><button class="btn-edit" id="resetPwBtn">📧 Reset Kata Laluan</button></div></div>`;
  }

  function renderPlanTab(uid, plan) {
    if (!plan) return `<div class="section-card"><div class="section-title">📋 PELAN KEWANGAN</div><div class="info-row">Tiada pelan disimpan.</div><button class="btn-edit" id="createEmptyPlanBtn">+ Buat Pelan Kosong</button></div>`;
    const income = plan.income || 0;
    const formula = plan.formula || '50/30/20';
    let pct = { needs: 50, wants: 30, savings: 20 };
    if (formula === 'free' && plan.freePct) pct = plan.freePct;
    else if (FORMULAS[formula]) pct = FORMULAS[formula];
    const savingsAmt = Math.round(income * pct.savings / 100);
    const commitments = plan.commitments || [];
    const commitTotal = commitments.reduce((s,c)=> s + (c.amount||0),0);
    return `<div class="section-card"><div class="section-title">📊 PELAN AKTIF (${formula === 'free' ? 'BEBAS' : formula})</div>
      <div class="info-row"><span class="info-label">Pendapatan bulanan</span><span class="info-value">RM ${income.toLocaleString('ms-MY')}</span></div>
      <div class="info-row"><span class="info-label">Simpanan / bulan</span><span class="info-value">RM ${savingsAmt.toLocaleString('ms-MY')} (${pct.savings}%)</span></div>
      <div class="info-row"><span class="info-label">Keperluan (${pct.needs}%)</span><span class="info-value">RM ${Math.round(income * pct.needs/100).toLocaleString('ms-MY')}</span></div>
      <div class="info-row"><span class="info-label">Kehendak (${pct.wants}%)</span><span class="info-value">RM ${Math.round(income * pct.wants/100).toLocaleString('ms-MY')}</span></div>
      <div class="info-row"><span class="info-label">Komitmen</span><span class="info-value">${commitments.length} item (Jumlah: RM ${commitTotal.toLocaleString('ms-MY')})</span></div>
      <div class="inline-actions"><button class="btn-edit" id="editPlanBtn">✏️ Edit Pelan</button><button class="btn-edit btn-danger" id="clearPlanBtn">🗑️ Padam Pelan</button></div>
      <div id="planEditor" style="display:none; margin-top:16px;"></div></div>`;
  }

  function renderGoalsTab(uid, goals) {
    const active = goals.filter(g => !g.completed);
    const completed = goals.filter(g => g.completed);
    let activeHtml = active.map(g => `<div class="goal-card"><div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;"><strong>${escapeHtml(g.name)}</strong><span style="background:${g.priority==='high'?'#ff606020':'#f5b73120'}; color:${g.priority==='high'?'#ff9090':'#f5b731'}; padding:2px 8px; border-radius:20px; font-size:11px;">${g.priority}</span></div>
      <div>Sasaran: RM ${(g.target||0).toLocaleString('ms-MY')}</div><div>Terkumpul: RM ${(g.saved||0).toLocaleString('ms-MY')}</div>
      <div class="progress-bar-mini"><div class="progress-fill-mini" style="width:${Math.min(100, ((g.saved||0)/(g.target||1))*100)}%"></div></div>
      <div class="inline-actions" style="margin-top:8px;"><input type="number" id="savingsAdd-${g.id}" placeholder="+ RM" style="width:100px; background:#0e1a14; border:1px solid #2a3d2e; border-radius:8px; padding:6px;" />
      <button class="btn-edit" onclick="window.adminAddSavings('${uid}','${g.id}')">Tambah</button>
      <button class="btn-edit" onclick="window.adminCompleteGoal('${uid}','${g.id}')">✓ Selesai</button>
      <button class="btn-edit btn-danger" onclick="window.adminDeleteGoal('${uid}','${g.id}')">Padam</button></div></div>`).join('');
    let completedHtml = completed.map(g => `<div class="goal-card" style="opacity:0.7"><div><strong>✅ ${escapeHtml(g.name)}</strong> (Selesai) - RM ${(g.target||0).toLocaleString('ms-MY')}</div><button class="btn-edit" onclick="window.adminUncompleteGoal('${uid}','${g.id}')">↩️ Pulihkan</button></div>`).join('');
    return `<div class="section-card"><div class="section-title">🎯 MATLAMAT AKTIF</div>${activeHtml || '<div class="info-row">Tiada matlamat aktif.</div>'}
      <div style="margin-top:12px;"><button class="btn-edit" id="adminAddGoalBtn">+ Tambah Matlamat</button></div>
      ${completed.length ? `<div class="section-title" style="margin-top:16px;">🏆 PENCAPAIAN (${completed.length})</div>${completedHtml}` : ''}</div>`;
  }

  function renderDangerTab(uid) {
    return `<div class="section-card" style="border-color: rgba(220,60,60,0.3);"><div class="section-title" style="color:#e05555">⚠️ ZON BAHAYA</div>
      <div class="info-row">Padam semua data kewangan & matlamat pengguna (kekalkan akaun Firebase). Tindakan tidak boleh balik.</div>
      <button class="btn-edit btn-danger" id="adminDeleteUserDataBtn" style="margin-top:8px;">🗑️ Padam Semua Data Pengguna</button></div>`;
  }

  function attachPlanTabEvents(uid) {
    const editBtn = document.getElementById('editPlanBtn');
    const clearBtn = document.getElementById('clearPlanBtn');
    const createEmptyBtn = document.getElementById('createEmptyPlanBtn');
    if (editBtn) editBtn.onclick = () => showPlanEditor(uid);
    if (clearBtn) clearBtn.onclick = () => clearUserPlan(uid);
    if (createEmptyBtn) createEmptyBtn.onclick = () => createEmptyPlan(uid);
  }
  function attachGoalsTabEvents(uid) {
    const addBtn = document.getElementById('adminAddGoalBtn');
    if (addBtn) addBtn.onclick = () => showAddGoalPopup(uid);
  }
  function attachDangerEvent(uid) {
    const delBtn = document.getElementById('adminDeleteUserDataBtn');
    if (delBtn) delBtn.onclick = async () => {
      if (confirm('⚠️ PADAM SEMUA DATA (plan & matlamat)? TINDAKAN KEKAL.')) {
        const goalsSnap = await getDocs(collection(db, 'users', uid, 'goals'));
        for (const docSnap of goalsSnap.docs) await deleteDoc(doc(db, 'users', uid, 'goals', docSnap.id));
        await updateDoc(doc(db, 'users', uid), { plan: null });
        showToast('Semua data pengguna telah dipadam');
        loadUserFullDetail(uid);
        loadAllUsers();
      }
    };
  }
  async function showPlanEditor(uid) {
    const editorDiv = document.getElementById('planEditor');
    const userDoc = await getDoc(doc(db, 'users', uid));
    const plan = userDoc.data()?.plan || {};
    const income = plan.income || '';
    const formula = plan.formula || '50/30/20';
    let freePct = plan.freePct || { needs:50, wants:30, savings:20 };
    editorDiv.style.display = 'block';
    editorDiv.innerHTML = `<div class="form-group"><label>Pendapatan Bulanan (RM)</label><input type="number" id="editIncome" class="admin-input" value="${income}" /></div>
      <div class="form-group"><label>Formula Simpanan</label><select id="editFormula" class="admin-select"><option value="50/30/20" ${formula==='50/30/20'?'selected':''}>50/30/20</option><option value="70/20/10" ${formula==='70/20/10'?'selected':''}>70/20/10</option><option value="free" ${formula==='free'?'selected':''}>BEBAS</option></select></div>
      <div id="freePctFields" style="${formula!=='free'?'display:none':''}"><div class="form-group"><label>Keperluan %</label><input type="number" id="freeNeeds" class="admin-input" value="${freePct.needs}" /></div>
      <div class="form-group"><label>Kehendak %</label><input type="number" id="freeWants" class="admin-input" value="${freePct.wants}" /></div>
      <div class="form-group"><label>Simpanan %</label><input type="number" id="freeSavings" class="admin-input" value="${freePct.savings}" /></div></div>
      <div class="inline-actions"><button class="btn-edit" id="savePlanChanges">Simpan</button><button class="btn-edit" id="cancelPlanEdit">Batal</button></div>`;
    document.getElementById('editFormula').addEventListener('change', (e) => { document.getElementById('freePctFields').style.display = e.target.value === 'free' ? 'block' : 'none'; });
    document.getElementById('savePlanChanges').onclick = async () => {
      const newIncome = parseFloat(document.getElementById('editIncome').value) || 0;
      const newFormula = document.getElementById('editFormula').value;
      let newPct = null;
      if (newFormula === 'free') {
        const needs = parseFloat(document.getElementById('freeNeeds').value) || 0;
        const wants = parseFloat(document.getElementById('freeWants').value) || 0;
        const savings = parseFloat(document.getElementById('freeSavings').value) || 0;
        if (needs+wants+savings !== 100) { showToast('Jumlah peratusan mesti 100%', true); return; }
        newPct = { needs, wants, savings };
      }
      const updatedPlan = { income: newIncome, formula: newFormula, commitments: plan.commitments || [] };
      if (newFormula === 'free') updatedPlan.freePct = newPct;
      await updateDoc(doc(db, 'users', uid), { plan: updatedPlan });
      showToast('Pelan dikemas kini');
      editorDiv.style.display = 'none';
      loadUserFullDetail(uid);
      loadAllUsers();
    };
    document.getElementById('cancelPlanEdit').onclick = () => { editorDiv.style.display = 'none'; };
  }
  async function clearUserPlan(uid) {
    if (confirm('Padamkan keseluruhan pelan kewangan pengguna?')) {
      await updateDoc(doc(db, 'users', uid), { plan: null });
      showToast('Pelan dipadam');
      loadUserFullDetail(uid);
      loadAllUsers();
    }
  }
  async function createEmptyPlan(uid) {
    await updateDoc(doc(db, 'users', uid), { plan: { income: 0, formula: '50/30/20', commitments: [] } });
    showToast('Pelan kosong dicipta');
    loadUserFullDetail(uid);
    loadAllUsers();
  }
  async function showAddGoalPopup(uid) {
    const name = prompt('Nama matlamat:');
    if (!name) return;
    const target = parseFloat(prompt('Sasaran (RM):'));
    if (isNaN(target) || target <= 0) return;
    const priority = prompt('Keutamaan (high/medium/low):', 'medium');
    await setDoc(doc(collection(db, 'users', uid, 'goals')), { name, target, priority, saved: 0, completed: false, createdAt: Date.now() });
    showToast('Matlamat ditambah');
    loadUserFullDetail(uid);
    loadAllUsers();
  }
  window.adminAddSavings = async (uid, goalId) => {
    const input = document.getElementById(`savingsAdd-${goalId}`);
    const addVal = parseFloat(input.value);
    if (isNaN(addVal) || addVal <= 0) { showToast('Jumlah sah diperlukan', true); return; }
    const goalRef = doc(db, 'users', uid, 'goals', goalId);
    const goalSnap = await getDoc(goalRef);
    const current = goalSnap.data()?.saved || 0;
    await updateDoc(goalRef, { saved: current + addVal });
    showToast(`+RM ${addVal.toLocaleString('ms-MY')} ditambah`);
    loadUserFullDetail(uid);
    loadAllUsers();
  };
  window.adminCompleteGoal = async (uid, goalId) => {
    await updateDoc(doc(db, 'users', uid, 'goals', goalId), { completed: true, completedAt: Date.now() });
    showToast('Matlamat ditanda selesai');
    loadUserFullDetail(uid);
    loadAllUsers();
  };
  window.adminDeleteGoal = async (uid, goalId) => {
    if (confirm('Padam matlamat ini secara kekal?')) {
      await deleteDoc(doc(db, 'users', uid, 'goals', goalId));
      showToast('Matlamat dipadam');
      loadUserFullDetail(uid);
      loadAllUsers();
    }
  };
  window.adminUncompleteGoal = async (uid, goalId) => {
    await updateDoc(doc(db, 'users', uid, 'goals', goalId), { completed: false, completedAt: null });
    showToast('Matlamat dipulihkan ke aktif');
    loadUserFullDetail(uid);
    loadAllUsers();
  };
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
    });
  });
</script>
</body>
</html>
